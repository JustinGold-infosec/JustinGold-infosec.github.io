<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <!-- Preload theme to prevent flash -->
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'dark'); // Default to dark
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <style>
    /* ===== CSS Variables for Theming ===== */
    :root {
      --transition-speed: 0.3s;
    }

    [data-theme="dark"] {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --border: #30363d;
      --code-bg: #161b22;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f6f8fa;
      --bg-tertiary: #eaeef2;
      --text-primary: #1f2328;
      --text-secondary: #59636e;
      --text-muted: #8b949e;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --border: #d1d9e0;
      --code-bg: #f6f8fa;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    /* ===== Base Styles ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color var(--transition-speed), color var(--transition-speed);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header & Navigation ===== */
    header {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: background-color var(--transition-speed), border-color var(--transition-speed);
    }

    nav {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .site-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      transition: color var(--transition-speed);
    }

    .site-title:hover {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color var(--transition-speed);
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
    }

    /* ===== Theme Toggle Button ===== */
    .theme-toggle {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      transition: all var(--transition-speed);
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      background: var(--bg-secondary);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      fill: var(--text-secondary);
      transition: fill var(--transition-speed);
    }

    .theme-toggle:hover svg {
      fill: var(--accent);
    }

    .sun-icon { display: none; }
    .moon-icon { display: block; }

    [data-theme="light"] .sun-icon { display: block; }
    [data-theme="light"] .moon-icon { display: none; }

    /* ===== Main Content ===== */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
      width: 100%;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    /* ===== Typography ===== */
    h1, h2, h3, h4, h5, h6 {
      color: var(--text-primary);
      margin: 1.5rem 0 1rem;
      line-height: 1.3;
      font-weight: 600;
    }

    h1 { font-size: 2rem; margin-top: 0; }
    h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h3 { font-size: 1.25rem; }

    p {
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color var(--transition-speed);
    }

    a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ===== Lists ===== */
    ul, ol {
      margin: 1rem 0;
      padding-left: 2rem;
    }

    li {
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    /* ===== Code ===== */
    code {
      background-color: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.4rem;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.9em;
      color: var(--accent);
    }

    pre {
      background-color: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text-primary);
    }

    /* ===== Horizontal Rule ===== */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* ===== Blockquote ===== */
    blockquote {
      border-left: 4px solid var(--accent);
      margin: 1.5rem 0;
      padding: 0.5rem 1rem;
      background-color: var(--bg-secondary);
      border-radius: 0 8px 8px 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    blockquote p {
      margin: 0;
      color: var(--text-secondary);
    }

    /* ===== Button Styles ===== */
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      margin: 0.5rem 0.5rem 0.5rem 0;
      background-color: var(--accent);
      color: var(--bg-primary);
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all var(--transition-speed);
    }

    .btn:hover {
      background-color: var(--accent-hover);
      text-decoration: none;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
      color: var(--bg-primary);
    }

    .btn-outline {
      background-color: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
    }

    .btn-outline:hover {
      background-color: var(--accent);
      color: var(--bg-primary);
    }

    /* ===== Footer ===== */
    footer {
      background-color: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      transition: background-color var(--transition-speed), border-color var(--transition-speed);
    }

    footer a {
      color: var(--text-secondary);
    }

    footer a:hover {
      color: var(--accent);
    }

    .footer-socials {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .footer-socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition-speed), color var(--transition-speed);
    }

    .footer-socials a:hover {
      transform: translateY(-3px);
      color: var(--accent);
    }

    .footer-socials svg {
      fill: currentColor;
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      header {
        padding: 1rem;
      }

      nav {
        justify-content: center;
      }

      .nav-links {
        gap: 1rem;
      }

      main {
        padding: 2rem 1rem;
      }

      h1 { font-size: 1.75rem; }
      h2 { font-size: 1.35rem; }

      .btn {
        display: block;
        text-align: center;
        margin: 0.5rem 0;
      }
    }

    /* ===== Blog Styles ===== */
    .blog-intro {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .blog-filters {
      margin: 1.5rem 0;
      padding: 1.25rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .filter-section {
      margin-bottom: 0.75rem;
    }

    .filter-section:last-child {
      margin-bottom: 0;
    }

    .filter-label {
      display: inline-block;
      margin-right: 0.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-tag {
      display: inline-block;
      padding: 0.25rem 0.65rem;
      margin: 0.2rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.8rem;
      transition: all var(--transition-speed);
    }

    .filter-tag:hover,
    .filter-tag.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-primary);
      text-decoration: none;
    }

    .posts-list {
      margin-top: 1.5rem;
    }

    .post-card {
      display: block;
      padding: 1.25rem;
      margin-bottom: 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color var(--transition-speed), transform var(--transition-speed), box-shadow var(--transition-speed);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .post-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      text-decoration: none;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .post-card h2 {
      color: var(--text-primary);
      transition: color var(--transition-speed);
    }

    .post-card:hover h2 {
      color: var(--accent);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }

    .post-date {
      color: var(--text-muted);
    }

    .post-category {
      padding: 0.15rem 0.5rem;
      background: var(--accent);
      border-radius: 4px;
      color: var(--bg-primary);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .post-card h2 {
      margin: 0 0 0.5rem 0;
      padding: 0;
      border: none;
      font-size: 1.25rem;
      color: var(--text-primary);
    }

    .post-card:hover h2 {
      color: var(--accent);
    }

    .post-excerpt {
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag {
      padding: 0.15rem 0.45rem;
      background: var(--bg-tertiary);
      border-radius: 4px;
      color: var(--accent);
      font-size: 0.75rem;
    }

    .no-posts {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem;
      font-style: italic;
    }

    /* Back Link - Pill Style */
    .back-link-pill {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      transition: all var(--transition-speed);
    }

    .back-link-pill:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-primary);
      text-decoration: none;
    }

    /* Post Layout with Sticky Sidebar */
    .post-layout {
      display: flex;
      gap: 2rem;
      position: relative;
    }

    .post-sidebar {
      position: sticky;
      top: 100px;
      height: fit-content;
      flex-shrink: 0;
    }

    .post-main {
      flex: 1;
      min-width: 0;
    }

    @media (max-width: 900px) {
      .post-layout {
        flex-direction: column;
      }

      .post-sidebar {
        position: static !important;
        top: auto !important;
        height: auto;
        order: 2;
        margin-top: 2rem;
        margin-bottom: 0;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
      }

      .post-main {
        order: 1;
      }
    }

    /* Single Post Styles */
    .post-header {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .post-header h1 {
      margin-top: 0;
      margin-bottom: 0.75rem;
    }

    .post-content {
      line-height: 1.8;
    }

    .post-content h2 {
      margin-top: 2rem;
    }

    .post-footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* ===== News Feed Styles ===== */
    .news-feed-container {
      margin-top: 1.5rem;
      border-radius: 8px;
      overflow: hidden;
    }

    /* Override RSS.app widget styles to match theme */
    .news-feed-container rssapp-carousel {
      --rss-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title | default: "Justin Gold" }}</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a></li>
        <li><a href="{{ '/projects/' | relative_url }}" {% if page.url == '/projects/' %}class="active"{% endif %}>Projects</a></li>
        <li><a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a></li>
        <li>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
            <svg class="sun-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 17.5a5.5 5.5 0 1 0 0-11 5.5 5.5 0 0 0 0 11zm0 1.5a7 7 0 1 1 0-14 7 7 0 0 1 0 14zm0-17a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 2zm0 18a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 20zM4.22 4.22a.75.75 0 0 1 1.06 0l1.06 1.06a.75.75 0 0 1-1.06 1.06L4.22 5.28a.75.75 0 0 1 0-1.06zm13.44 13.44a.75.75 0 0 1 1.06 0l1.06 1.06a.75.75 0 0 1-1.06 1.06l-1.06-1.06a.75.75 0 0 1 0-1.06zM2 12a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 2 12zm18 0a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 20 12zM5.28 18.72a.75.75 0 0 1 0-1.06l1.06-1.06a.75.75 0 1 1 1.06 1.06l-1.06 1.06a.75.75 0 0 1-1.06 0zm13.44-13.44a.75.75 0 0 1 0-1.06l1.06-1.06a.75.75 0 1 1 1.06 1.06l-1.06 1.06a.75.75 0 0 1-1.06 0z"/>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M9.36 3.293a1 1 0 0 1 .187 1.157A7.45 7.45 0 0 0 19.55 14.453a1 1 0 0 1 1.343 1.343 9.45 9.45 0 1 1-12.69-12.69 1 1 0 0 1 1.158.187z"/>
            </svg>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name | default: "Justin Gold" }}. Built with Jekyll.</p>
    <div class="footer-socials">
      <a href="https://www.linkedin.com/in/justinit/" aria-label="LinkedIn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
      <a href="https://www.youtube.com/@jgold96" aria-label="YouTube">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </a>
      <a href="https://github.com/{{ site.author.github }}" aria-label="GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      </a>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('theme-toggle');
    
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
